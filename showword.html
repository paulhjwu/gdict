<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSV Word Search</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; padding: 20px; }
  h1 { font-size: 1.4rem; margin-bottom: 16px; }

  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    align-items: start;
  }
  @media (max-width: 800px) { .panels { grid-template-columns: 1fr; } }

  .panel {
    background: #fff; border: 1px solid #ddd; border-radius: 10px;
    padding: 14px 16px; min-width: 0;
  }
  .panel-title {
    font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: .07em; color: #64748b; margin-bottom: 10px;
  }
  .controls {
    display: flex; gap: 6px; margin-bottom: 8px; align-items: center; flex-wrap: wrap;
  }
  .file-select {
    flex: 1; min-width: 160px; padding: 7px 9px; border: 1px solid #ccc;
    border-radius: 6px; font-size: 0.85rem; background: #fff; cursor: pointer;
  }
  .search-row input {
    flex: 1; min-width: 120px; padding: 7px 10px; border: 1px solid #ccc;
    border-radius: 6px; font-size: 0.9rem;
  }
  .search-row button {
    padding: 7px 16px; background: #2563eb; color: #fff; border: none;
    border-radius: 6px; font-size: 0.9rem; cursor: pointer;
  }
  .search-row button:hover { background: #1d4ed8; }
  .search-row button:disabled { background: #94a3b8; cursor: default; }
  .status { font-size: 0.82rem; color: #555; margin-bottom: 8px; min-height: 1.1em; }
  .results {
    display: flex; flex-direction: column; gap: 8px;
    max-height: 75vh; overflow-y: auto;
  }

  /* TSV card style */
  .card {
    background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 7px; padding: 10px 13px;
  }
  .card-header {
    display: flex; gap: 10px; align-items: baseline; flex-wrap: wrap; margin-bottom: 7px;
  }
  .card-ref   { font-weight: 700; font-size: 0.9rem; color: #1e40af; }
  .card-text  { font-size: 1.15rem; font-family: 'SBL Greek', 'GFS Didot', serif; color: #333; }
  .card-gloss { font-size: 0.88rem; color: #555; font-style: italic; }

  .fields {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 4px 12px;
  }
  .field { display: flex; flex-direction: column; }
  .field-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: .05em; color: #94a3b8; }
  .field-value { font-size: 0.85rem; color: #111; }
  .field-value.greek { font-family: 'SBL Greek', 'GFS Didot', serif; font-size: 0.95rem; }

  /* Clickable Greek words */
  .greek-word {
    cursor: pointer; border-bottom: 1px dashed #93c5fd; transition: color .15s;
  }
  .greek-word:hover { color: #2563eb; border-bottom-color: #2563eb; }

  /* Dict table style */
  .dict-wrap { overflow-x: auto; }
  .dict-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  .dict-table th {
    background: #f1f5f9; text-align: left; padding: 7px 10px;
    font-size: 0.68rem; text-transform: uppercase; letter-spacing: .05em; color: #64748b;
    border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; z-index: 1;
  }
  .dict-table td {
    padding: 7px 10px; border-bottom: 1px solid #f1f5f9; vertical-align: top;
  }
  .dict-table tr:last-child td { border-bottom: none; }
  .dict-table tr:hover td { background: #f8fafc; }
  .dict-table td.note { font-size: 0.8rem; color: #555; font-style: italic; }

  .no-results { color: #888; text-align: center; padding: 28px; font-size: 0.9rem; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.35); z-index: 100;
  }
  .modal-overlay.open { display: block; }
  .modal-box {
    position: fixed; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    background: #fff; border-radius: 12px;
    min-width: 320px; max-width: 500px; width: 92%; max-height: 82vh;
    box-shadow: 0 8px 32px rgba(0,0,0,.22);
    display: flex; flex-direction: column;
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px 12px; cursor: grab;
    border-bottom: 1px solid #e2e8f0; flex-shrink: 0; user-select: none;
  }
  .modal-header:active { cursor: grabbing; }
  .modal-close {
    background: none; border: none; font-size: 1.4rem; cursor: pointer;
    color: #94a3b8; padding: 2px 4px; line-height: 1;
  }
  .modal-close:hover { color: #334155; }
  .modal-greek {
    font-family: 'SBL Greek', 'GFS Didot', serif;
    font-size: 2rem; color: #1e3a8a; line-height: 1.2;
  }
  .modal-body {
    padding: 12px 20px; flex-shrink: 0;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .modal-translit {
    font-size: 1rem; color: #475569; min-height: 1.4em;
    font-style: italic; letter-spacing: .03em;
  }
  .modal-speak {
    padding: 7px 24px; background: #2563eb; color: #fff; border: none;
    border-radius: 8px; font-size: 0.9rem; cursor: pointer;
  }
  .modal-speak:hover { background: #1d4ed8; }
  .modal-speak:disabled { background: #94a3b8; cursor: default; }
  .modal-occurrences { overflow-y: auto; flex: 1; }
  .modal-occ-item {
    display: flex; gap: 10px; align-items: center;
    padding: 7px 20px; border-bottom: 1px solid #f1f5f9; cursor: pointer;
  }
  .modal-occ-item:hover { background: #f0f9ff; }
  .modal-occ-item:last-child { border-bottom: none; }
  .occ-ref  { font-size: 0.78rem; color: #1e40af; font-weight: 600; min-width: 90px; flex-shrink: 0; }
  .occ-word-col { display: flex; flex-direction: column; flex: 1; min-width: 0; }
  .occ-word { font-family: 'SBL Greek', 'GFS Didot', serif; font-size: 1rem; color: #1e293b; }
  .occ-translit { font-size: 0.72rem; color: #94a3b8; font-style: italic; }
  .occ-morph { font-size: 0.78rem; color: #64748b; font-family: monospace; flex-shrink: 0; }
  .occ-speak-btn {
    padding: 3px 9px; background: #2563eb; color: #fff; border: none;
    border-radius: 5px; font-size: 0.78rem; cursor: pointer; flex-shrink: 0;
  }
  .occ-speak-btn:hover { background: #1d4ed8; }
  .occ-speak-btn:disabled { background: #94a3b8; cursor: default; }
</style>
</head>
<body>

<h1>TSV Word Search</h1>

<div class="panels">

  <!-- Left: tsv/ -->
  <div class="panel">
    <div class="panel-title">tsv/</div>
    <div class="controls">
      <select class="file-select" id="tsv-fileSelect" onchange="tsvFileChange()"></select>
    </div>
    <div class="controls search-row">
      <input id="tsv-query" type="text" placeholder="Search English or lemma…" />
      <button id="tsv-searchBtn" onclick="tsvSearch()" disabled>Search</button>
    </div>
    <div id="tsv-status" class="status">Loading…</div>
    <div id="tsv-results" class="results"></div>
  </div>

  <!-- Right: dict/ -->
  <div class="panel">
    <div class="panel-title">dict/</div>
    <div class="controls">
      <select class="file-select" id="dict-fileSelect" onchange="dictFileChange()"></select>
    </div>
    <div id="dict-status" class="status">Loading…</div>
    <div id="dict-results" class="results"></div>
  </div>

</div>

<!-- Word popup modal -->
<div class="modal-overlay" id="word-modal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-greek" id="modal-greek"></div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="modal-translit" id="modal-translit">…</div>
      <button class="modal-speak" id="modal-speak" onclick="speakCurrentWord()">🔊 Speak</button>
      <div id="modal-speak-status" style="font-size:0.78rem;color:#64748b;min-height:1em;"></div>
    </div>
    <div class="modal-occurrences" id="modal-occurrences"></div>
  </div>
</div>

<script>

// ── SBL Greek transliteration ─────────────────────────────────
function sblTranslit(greek) {
  if (!greek) return '';
  const GRK = {
    'α':'a','β':'b','γ':'g','δ':'d','ε':'e','ζ':'z','η':'ē',
    'θ':'th','ι':'i','κ':'k','λ':'l','μ':'m','ν':'n','ξ':'x',
    'ο':'o','π':'p','ρ':'r','σ':'s','ς':'s','τ':'t','υ':'y',
    'φ':'ph','χ':'ch','ψ':'ps','ω':'ō',
  };
  const ROUGH = '̔', ISUB = 'ͅ', DIER = '̈';
  const isComb = c => c >= '̀' && c <= 'ͯ';
  const nfd = greek.normalize('NFD');

  // Parse into tokens: {lc, up, rough, iotaSub, dier} per Greek letter
  const tokens = [];
  for (let i = 0; i < nfd.length;) {
    const ch = nfd[i], lc = ch.toLowerCase();
    if (lc in GRK) {
      let rough = false, iotaSub = false, dier = false;
      i++;
      while (i < nfd.length && isComb(nfd[i])) {
        if (nfd[i] === ROUGH) rough = true;
        if (nfd[i] === ISUB)  iotaSub = true;
        if (nfd[i] === DIER)  dier = true;
        i++;
      }
      tokens.push({ ch, lc, up: ch !== lc, rough, iotaSub, dier });
    } else {
      tokens.push({ ch, raw: true });
      i++;
    }
  }

  let out = '';
  for (let j = 0; j < tokens.length; j++) {
    const t = tokens[j];
    if (t.raw) { out += t.ch; continue; }
    const { lc, up, rough, iotaSub, dier } = t;

    let lat = GRK[lc];

    // υ → u inside diphthong (αυ ευ ηυ ου), otherwise y
    if (lc === 'υ' && !dier) {
      const prev = j > 0 && !tokens[j-1].raw ? tokens[j-1].lc : '';
      if ('αεηο'.includes(prev)) lat = 'u';
    }
    // γ → n before γ κ ξ χ (produces ng/nk/nx/nch)
    if (lc === 'γ') {
      const next = j+1 < tokens.length && !tokens[j+1].raw ? tokens[j+1].lc : '';
      if ('γκξχ'.includes(next)) lat = 'n';
    }
    // Rough breathing: prepend h (rh for ρ)
    if (rough) {
      lat = lc === 'ρ' ? 'rh' : 'h' + lat;
    }
    // Iota subscript: append i
    if (iotaSub) lat += 'i';
    // Capitalise first character only
    if (up && lat) lat = lat[0].toUpperCase() + lat.slice(1);

    out += lat;
  }
  return out;
}

// ── Audio playback ────────────────────────────────────────────────────────────
function setSpeakStatus(msg, isError) {
  const el = document.getElementById('modal-speak-status');
  if (el) { el.textContent = msg; el.style.color = isError ? '#ef4444' : '#64748b'; }
}

let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}

async function speakWord(translit, greekText) {
  if (!translit || !greekText) { setSpeakStatus('Nothing to speak.', true); return; }
  const ctx = getAudioCtx(); // create/resume within user gesture
  setSpeakStatus('Loading…');
  try {
    const params = new URLSearchParams({ translit, text: greekText });
    const resp = await fetch(`http://localhost:8765/api/word-audio?${params}`);
    if (!resp.ok) throw new Error(`Server error ${resp.status}`);
    const ab = await resp.arrayBuffer();
    if (!ab.byteLength) throw new Error('Empty audio response');
    // Ensure context is running (resume() is async — await it here)
    if (ctx.state === 'suspended') await ctx.resume();
    // Use callback form for broader browser compatibility
    const decoded = await new Promise((resolve, reject) =>
      ctx.decodeAudioData(ab, resolve, reject)
    );
    const src = ctx.createBufferSource();
    src.buffer = decoded;
    src.connect(ctx.destination);
    src.start(0);
    setSpeakStatus('');
  } catch (e) {
    setSpeakStatus('Error: ' + e.message, true);
  }
}

// ── Transliteration lookup (from morphology.sqlite via word_translit.json) ───
let wordTranslit = {};
async function loadWordTranslit() {
  const resp = await fetch('word_translit.json');
  wordTranslit = await resp.json();
}

function lookupTranslit(word) {
  if (!word) return '';
  return wordTranslit[word.toLowerCase()] || sblTranslit(word);
}

// ── File lists ────────────────────────────────────────────────
const TSV_FILES = [
  'source_macula_greek_SBLGNT+required.tsv',
  'source_macula_hebrew+required.tsv',
  'target_NA27-YLT.tsv',
  'target_ot_WLC-YLT.tsv',
  'target_BSB_20240904.tsv',
  'target_arb-vd.tsv',
  'target_VanDyck_new.tsv',
  'target_BSB_old.tsv',
];
const DICT_FILES = ['Koine_Greek_Alphabet_Guide.tsv'];

const TSV_DISPLAY_FIELDS = [
  { key: 'class',      label: 'Class'       },
  { key: 'type',       label: 'Type'        },
  { key: 'english',    label: 'English'     },
  { key: 'lemma',      label: 'Lemma',      greek: true },
  { key: 'normalized', label: 'Normalized', greek: true },
  { key: 'strong',     label: 'Strong'      },
  { key: 'morph',      label: 'Morph'       },
  { key: 'person',     label: 'Person'      },
  { key: 'number',     label: 'Number'      },
  { key: 'gender',     label: 'Gender'      },
  { key: 'case',       label: 'Case'        },
  { key: 'tense',      label: 'Tense'       },
  { key: 'voice',      label: 'Voice'       },
  { key: 'mood',       label: 'Mood'        },
  { key: 'degree',     label: 'Degree'      },
  { key: 'domain',     label: 'Domain'      },
];

// ── Panel state ───────────────────────────────────────────────
const tsv  = { COL: {}, rows: [], headers: [] };
const dict = { COL: {}, rows: [], headers: [] };

// ── TSV panel ─────────────────────────────────────────────────
function tsvFileChange() {
  tsv.COL = {}; tsv.rows = []; tsv.headers = [];
  document.getElementById('tsv-results').innerHTML = '';
  document.getElementById('tsv-searchBtn').disabled = true;
  document.getElementById('tsv-status').textContent = 'Loading TSV…';
  loadTSV();
}

async function loadTSV() {
  const file = document.getElementById('tsv-fileSelect').value;
  try {
    const resp = await fetch(`tsv/${file}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();
    const lines = text.split('\n');
    tsv.headers = lines[0].split('\t').map(h => h.trim());
    tsv.headers.forEach((h, i) => { tsv.COL[h] = i; });
    tsv.rows = lines.slice(1).filter(l => l.trim()).map(l => l.split('\t'));
    document.getElementById('tsv-status').textContent =
      `${file}: ${tsv.rows.length.toLocaleString()} rows loaded.`;
    document.getElementById('tsv-searchBtn').disabled = false;
  } catch (e) {
    document.getElementById('tsv-status').textContent = `Error: ${e.message}`;
  }
}

function tsvSearch() {
  const query = document.getElementById('tsv-query').value.trim().toLowerCase();
  if (!query) return;

  const searchIdxs = ['english', 'lemma', 'text']
    .map(k => tsv.COL[k])
    .filter(i => i !== undefined);

  const matches = tsv.rows.filter(row =>
    searchIdxs.some(i => (row[i] || '').toLowerCase().includes(query))
  );

  document.getElementById('tsv-status').textContent =
    `${matches.length.toLocaleString()} result${matches.length !== 1 ? 's' : ''} for "${query}"`;

  renderTSV(matches);
}

function renderTSV(matches) {
  const container = document.getElementById('tsv-results');
  if (!matches.length) {
    container.innerHTML = '<div class="no-results">No results found.</div>';
    return;
  }
  const MAX = 200;
  const toShow = matches.slice(0, MAX);
  lastRenderMatches = toShow;

  const html = toShow.map(row => {
    const ref   = tsvVal(row, 'ref');
    const text  = tsvVal(row, 'text');
    const gloss = tsvVal(row, 'gloss');

    const textSpan = text
      ? `<span class="card-text greek-word" data-word="${escAttr(text)}" data-ref="${escAttr(ref)}">${escHtml(text)}</span>`
      : '';

    const fieldsHtml = TSV_DISPLAY_FIELDS.map(f => {
      const v = tsvVal(row, f.key);
      if (!v) return '';
      const valSpan = f.greek
        ? `<span class="field-value greek greek-word" data-word="${escAttr(v)}" data-ref="${escAttr(ref)}">${escHtml(v)}</span>`
        : `<span class="field-value">${escHtml(v)}</span>`;
      return `<div class="field">
        <span class="field-label">${f.label}</span>
        ${valSpan}
      </div>`;
    }).join('');

    return `<div class="card">
      <div class="card-header">
        <span class="card-ref">${escHtml(ref)}</span>
        ${textSpan}
        ${gloss ? `<span class="card-gloss">"${escHtml(gloss)}"</span>` : ''}
      </div>
      <div class="fields">${fieldsHtml}</div>
    </div>`;
  }).join('');

  const overflow = matches.length > MAX
    ? `<div class="no-results" style="padding:10px">Showing first ${MAX} of ${matches.length.toLocaleString()} results. Refine your search.</div>`
    : '';

  container.innerHTML = html + overflow;
}

function tsvVal(row, col) {
  const idx = tsv.COL[col];
  return (idx !== undefined && row[idx] !== undefined) ? row[idx].trim() : '';
}

// ── Dict panel ────────────────────────────────────────────────
function dictFileChange() {
  dict.COL = {}; dict.rows = []; dict.headers = [];
  document.getElementById('dict-results').innerHTML = '';
  document.getElementById('dict-status').textContent = 'Loading…';
  loadDict();
}

async function loadDict() {
  const file = document.getElementById('dict-fileSelect').value;
  try {
    const resp = await fetch(`dict/${file}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();
    const lines = text.split('\n');
    dict.headers = lines[0].split('\t').map(h => h.trim());
    dict.headers.forEach((h, i) => { dict.COL[h] = i; });
    dict.rows = lines.slice(1).filter(l => l.trim()).map(l => l.split('\t'));
    document.getElementById('dict-status').textContent =
      `${file}: ${dict.rows.length.toLocaleString()} rows loaded.`;
    renderDict();
  } catch (e) {
    document.getElementById('dict-status').textContent = `Error: ${e.message}`;
  }
}

function renderDict() {
  const container = document.getElementById('dict-results');
  const headerHtml = dict.headers.map(h => `<th>${escHtml(h)}</th>`).join('');
  const rowsHtml = dict.rows.map(row => {
    const filled = row.filter(c => c.trim());
    if (filled.length === 1 && (row[0] || '').trim().length > 40) {
      return `<tr><td class="note" colspan="${dict.headers.length}">${escHtml(row[0].trim())}</td></tr>`;
    }
    return `<tr>${dict.headers.map((h, i) =>
      `<td>${escHtml((row[i] || '').trim())}</td>`
    ).join('')}</tr>`;
  }).join('');
  container.innerHTML = `<div class="dict-wrap"><table class="dict-table">
    <thead><tr>${headerHtml}</tr></thead>
    <tbody>${rowsHtml}</tbody>
  </table></div>`;
}

// ── Word modal ────────────────────────────────────────────────
let currentWord  = '';
let currentRef   = '';
let currentNorm  = '';
let currentTranslit = '';
let lastRenderMatches = [];

function openWordModal(word, ref) {
  currentWord = word;
  currentRef  = ref || '';
  document.getElementById('modal-greek').textContent = word;
  document.getElementById('modal-translit').textContent = '…';


  // Reset to center before opening so drag position doesn't persist
  const box = document.querySelector('.modal-box');
  box.style.left = '50%';
  box.style.top = '50%';
  box.style.transform = 'translate(-50%, -50%)';

  document.getElementById('word-modal').classList.add('open');



  // Resolve lemma and normalized form, then look up transliteration
  const refIdx   = tsv.COL['ref'];
  const lemmaIdx = tsv.COL['lemma'];
  const normIdx  = tsv.COL['normalized'];
  let lemma = word;
  let translit = lookupTranslit(word);

  if (currentRef && refIdx !== undefined) {
    const row = lastRenderMatches.find(r => (r[refIdx] || '').trim() === currentRef);
    if (row) {
      if (lemmaIdx !== undefined) lemma = (row[lemmaIdx] || '').trim() || word;
      const norm = normIdx !== undefined ? (row[normIdx] || '').trim() : '';
      currentNorm = norm || word;
      translit = lookupTranslit(currentNorm);
    }
  }
  currentTranslit = translit;

  renderOccurrences(lemma);
  document.getElementById('modal-translit').textContent = translit || '—';
}

function closeModal() {
  document.getElementById('word-modal').classList.remove('open');
}

function renderOccurrences(lemma) {
  const container = document.getElementById('modal-occurrences');
  if (!lastRenderMatches.length || !lemma) { container.innerHTML = ''; return; }

  const lemmaIdx = tsv.COL['lemma'];
  const normIdx  = tsv.COL['normalized'];
  const morphIdx = tsv.COL['morph'];
  const refIdx   = tsv.COL['ref'];

  if (lemmaIdx === undefined) { container.innerHTML = ''; return; }

  // Filter by same lemma, then keep only the first row per unique normalized form
  const seen   = new Set();
  const unique = [];
  for (const row of lastRenderMatches) {
    if ((row[lemmaIdx] || '').trim() !== lemma) continue;
    const norm = normIdx !== undefined ? (row[normIdx] || '').trim() : '';
    if (!seen.has(norm)) {
      seen.add(norm);
      unique.push(row);
    }
  }

  if (!unique.length) { container.innerHTML = ''; return; }

  container.innerHTML = unique.map(row => {
    const r = refIdx   !== undefined ? (row[refIdx]   || '').trim() : '';
    const n = normIdx  !== undefined ? (row[normIdx]  || '').trim() : '';
    const m = morphIdx !== undefined ? (row[morphIdx] || '').trim() : '';
    const t = lookupTranslit(n);
    return `<div class="modal-occ-item" data-ref="${escAttr(r)}">
      <span class="occ-ref">${escHtml(r)}</span>
      <span class="occ-word-col">
        <span class="occ-word">${escHtml(n)}</span>
        ${t ? `<span class="occ-translit">${escHtml(t)}</span>` : ''}
      </span>
      <span class="occ-morph">${escHtml(m)}</span>
      <button class="occ-speak-btn" data-ref="${escAttr(r)}" data-translit="${escAttr(t)}" data-word="${escAttr(n)}">🔊</button>
    </div>`;
  }).join('');
}

function speakCurrentWord() {
  speakWord(currentTranslit, currentNorm || currentWord);
}

// ── Utilities ─────────────────────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── Init ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  loadWordTranslit();

  document.getElementById('tsv-fileSelect').innerHTML =
    TSV_FILES.map(f => `<option value="${f}">${f}</option>`).join('');
  tsvFileChange();

  document.getElementById('dict-fileSelect').innerHTML =
    DICT_FILES.map(f => `<option value="${f}">${f}</option>`).join('');
  dictFileChange();

  document.getElementById('tsv-query').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !document.getElementById('tsv-searchBtn').disabled) tsvSearch();
  });

  // Event delegation for Greek word clicks in TSV results
  document.getElementById('tsv-results').addEventListener('click', e => {
    const el = e.target.closest('.greek-word');
    if (el && el.dataset.word) openWordModal(el.dataset.word, el.dataset.ref || '');
  });

  // Close modal on overlay click
  document.getElementById('word-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('word-modal')) closeModal();
  });

  // Draggable modal header
  const modalBox = document.querySelector('.modal-box');
  document.querySelector('.modal-header').addEventListener('mousedown', e => {
    if (e.target.closest('button')) return;
    e.preventDefault();
    const rect = modalBox.getBoundingClientRect();
    modalBox.style.left = rect.left + 'px';
    modalBox.style.top  = rect.top  + 'px';
    modalBox.style.transform = 'none';
    let prevX = e.clientX, prevY = e.clientY;
    const onMove = ev => {
      modalBox.style.left = (parseFloat(modalBox.style.left) + ev.clientX - prevX) + 'px';
      modalBox.style.top  = (parseFloat(modalBox.style.top)  + ev.clientY - prevY) + 'px';
      prevX = ev.clientX; prevY = ev.clientY;
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  // Occurrence speak-button → word TTS
  document.getElementById('modal-occurrences').addEventListener('click', e => {
    const btn = e.target.closest('.occ-speak-btn');
    if (btn) speakWord(btn.dataset.translit || '', btn.dataset.word || '');
  });
});
</script>
</body>
</html>
